<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="55%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#FF5A4E"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS-style squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <!-- subtle top sheen -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#sheen)"/>

  <!-- Stylized 'j' glyph: vertical stem with rounded foot (descender curl) -->
  <g filter="url(#softShadow)">
    <!-- Stem + foot drawn as a single rounded path -->
    <path d="
      M 512 332
      L 512 690
      C 512 778, 448 836, 360 836
      C 304 836, 256 808, 232 760
      L 308 716
      C 322 744, 342 758, 366 758
      C 398 758, 420 736, 420 700
      L 420 332
      Z"
      fill="#FFFFFF"/>

    <!-- Sound-wave 'tittle' replacing the dot of the j: 3 ascending bars -->
    <rect x="430" y="232" width="34" height="56" rx="14" fill="#FFFFFF"/>
    <rect x="476" y="200" width="34" height="88" rx="14" fill="#FFFFFF"/>
    <rect x="522" y="172" width="34" height="116" rx="14" fill="#FFFFFF"/>
  </g>
</svg>
